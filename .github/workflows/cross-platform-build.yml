name: Android APK Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Clean project
        working-directory: ./AkkDictionary.MAUI
        run: dotnet clean

      - name: Restore dependencies
        working-directory: ./AkkDictionary.MAUI
        run: dotnet restore

      - name: Build Android APK (Release)
        working-directory: ./AkkDictionary.MAUI
        run: dotnet publish -f net8.0-android -c Release -p:AndroidPackageFormat=apk -p:AndroidKeyStore=false --no-restore

      - name: List build outputs
        working-directory: ./AkkDictionary.MAUI
        run: find . -name "*.apk" -type f

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: AkkDictionary.MAUI/bin/Release/net8.0-android/publish/*.apk
          if-no-files-found: warn
      
      - name: Create DMG
        run: |
          mkdir -p ./bin/releases
          hdiutil create -volname "AKK Dictionary" \
            -srcfolder ./bin/macos \
            -ov -format UDZO \
            ./bin/releases/AKK-Dictionary-macOS-v1.1.0.dmg
      
      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: ./bin/releases/

  create-release:
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android-apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
